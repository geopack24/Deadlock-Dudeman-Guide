<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Deadlock â€” The Dudemen's Study Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0e10;--sf:#141618;--cd:#1a1c20;--bd:#2a2d33;--b2:#444;--or:#e8622a;--re:#E24B4A;--gr:#4caf6a;--am:#d4a017;--bl:#378ADD;--pu:#7F77DD;--tx:#e8e6df;--mu:#888;--di:#555}
body{background:var(--bg);color:var(--tx);font-family:'Barlow',sans-serif;font-size:15px;min-height:100vh}
#app{max-width:820px;margin:0 auto;padding:14px 12px}
.hdr{text-align:center;padding:16px 0 12px;border-bottom:.5px solid var(--bd);margin-bottom:14px}
.hdr h1{font-family:'Bebas Neue',sans-serif;font-size:40px;letter-spacing:4px;color:var(--or);line-height:1}
.hdr p{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:4px;color:var(--mu);margin-top:3px;text-transform:uppercase}
input,textarea{font-family:'Barlow',sans-serif}
input[type=text],input[type=password]{width:100%;padding:8px 12px;background:var(--sf);border:.5px solid var(--bd);border-radius:7px;color:var(--tx);font-size:14px;outline:none;margin-bottom:10px}
input[type=text]:focus,input[type=password]:focus{border-color:var(--or)}
input[type=text]::placeholder,input[type=password]::placeholder{color:var(--di)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:6px;margin-bottom:14px}
.hc{border:.5px solid var(--bd);border-radius:8px;overflow:hidden;cursor:pointer;background:var(--sf);transition:all .12s}
.hc:hover{border-color:var(--b2);transform:translateY(-1px)}
.hc.sel{border-color:var(--or);box-shadow:0 0 0 1px var(--or)}
.hc img{width:100%;aspect-ratio:3/4;object-fit:cover;display:block}
.hc .nm{font-size:9px;font-weight:500;padding:3px 4px 2px;line-height:1.2}
.hc .rl{font-size:8px;color:var(--mu);font-family:'IBM Plex Mono',monospace;padding-bottom:3px}
.res{background:var(--sf);border:.5px solid var(--bd);border-radius:10px;padding:14px}
.rh{display:flex;gap:10px;align-items:flex-start;padding-bottom:12px;border-bottom:.5px solid var(--bd);margin-bottom:12px}
.rh img{width:60px;height:80px;border-radius:7px;object-fit:cover;flex-shrink:0;margin-top:2px}
.rn{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;line-height:1}
.rr{font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--mu);letter-spacing:2px;text-transform:uppercase;margin-top:2px;margin-bottom:8px}
.ab-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.ab-pill{background:var(--cd);border:.5px solid var(--bd);border-radius:5px;padding:5px 7px;display:flex;gap:6px;align-items:flex-start;position:relative;padding-right:22px}
.ab-key{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--or);background:rgba(232,98,42,.12);padding:1px 5px;border-radius:3px;flex-shrink:0;margin-top:1px}
.ab-name{font-size:10px;font-weight:500;color:var(--tx);line-height:1.3}
.ab-desc{font-size:9px;color:var(--mu);margin-top:1px;line-height:1.3}
.ab-flag{background:none;border:none;cursor:pointer;font-size:10px;color:var(--di);padding:0;position:absolute;top:4px;right:4px;transition:color .12s}
.ab-flag:hover{color:var(--re)}
.ab-flag.flagged{color:var(--re)}
.tb{background:rgba(232,98,42,.06);border:.5px solid rgba(232,98,42,.2);border-radius:6px;padding:8px 10px;font-size:12px;line-height:1.5;margin-bottom:10px}
.tl{font-size:9px;font-family:'IBM Plex Mono',monospace;letter-spacing:2px;text-transform:uppercase;color:var(--or);margin-bottom:3px}
.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.secl{font-size:9px;letter-spacing:2px;text-transform:uppercase;font-family:'IBM Plex Mono',monospace;color:var(--mu);margin-bottom:6px}
.row{display:flex;gap:6px;align-items:flex-start;padding:6px 8px;background:var(--cd);border:.5px solid var(--bd);border-radius:6px;margin-bottom:4px;font-size:11px;line-height:1.3;position:relative}
.dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:4px}
.flag-btn{background:none;border:none;cursor:pointer;font-size:13px;color:var(--di);padding:0 0 0 6px;flex-shrink:0;transition:color .12s;line-height:1}
.flag-btn:hover{color:var(--re)}
.flag-btn.flagged{color:var(--re)}
[data-tip]{cursor:help}
.tip{display:none;position:absolute;left:0;bottom:calc(100% + 4px);background:#0d0e10;border:.5px solid var(--or);border-radius:6px;padding:7px 11px;font-size:11px;color:var(--tx);white-space:normal;max-width:260px;z-index:50;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.7);line-height:1.5}
[data-tip]:hover .tip{display:block}
.ph{text-align:center;padding:28px;color:var(--di);font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:2px}
.notes-wrap{margin-top:14px;background:var(--cd);border:.5px solid var(--bd);border-radius:8px;padding:12px}
.notes-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.notes-title{font-size:10px;letter-spacing:3px;text-transform:uppercase;font-family:'IBM Plex Mono',monospace;color:var(--mu)}
.notes-actions{display:flex;gap:6px;align-items:center}
.lock-btn{background:none;border:.5px solid var(--bd);border-radius:5px;color:var(--mu);cursor:pointer;font-size:11px;padding:3px 8px;font-family:'IBM Plex Mono',monospace}
.lock-btn:hover{border-color:var(--b2);color:var(--tx)}
.lock-btn.unlocked{border-color:var(--or);color:var(--or)}
.notes-content{font-size:12px;line-height:1.6;color:var(--tx);white-space:pre-wrap;min-height:40px}
.notes-content.empty{color:var(--di);font-style:italic}
textarea.notes-edit{width:100%;background:var(--sf);border:.5px solid var(--or);border-radius:6px;color:var(--tx);font-size:12px;line-height:1.6;padding:8px;outline:none;resize:vertical;min-height:80px}
.notes-save{margin-top:6px;padding:6px 14px;background:var(--or);border:none;border-radius:6px;color:#fff;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:1px;cursor:pointer}
.notes-save:hover{opacity:.85}
.notes-sync{font-size:9px;font-family:'IBM Plex Mono',monospace;color:var(--di);margin-left:6px}
.dude-notes-wrap{margin-top:8px;background:var(--cd);border:.5px solid var(--bd);border-radius:8px;padding:12px}
.dude-notes-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.dude-notes-title{font-size:10px;letter-spacing:3px;text-transform:uppercase;font-family:'IBM Plex Mono',monospace;color:var(--mu)}
.dude-note-text{font-size:12px;line-height:1.6;color:var(--tx);white-space:pre-wrap;min-height:32px}
.dude-note-text.empty{color:var(--di);font-style:italic}
.comment-wrap{margin-top:10px;padding-top:10px;border-top:.5px solid var(--bd)}
.comment-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;font-family:'IBM Plex Mono',monospace;color:var(--mu);margin-bottom:6px}
.comment-list{margin-bottom:8px}
.comment-item{background:var(--sf);border:.5px solid var(--bd);border-radius:6px;padding:7px 10px;margin-bottom:5px;font-size:11px;line-height:1.5;color:var(--tx);position:relative}
.comment-item .c-del{position:absolute;top:6px;right:8px;background:none;border:none;color:var(--di);cursor:pointer;font-size:11px}
.comment-item .c-del:hover{color:var(--re)}
.comment-form{display:flex;gap:6px}
.comment-input{flex:1;padding:6px 10px;background:var(--sf);border:.5px solid var(--bd);border-radius:6px;color:var(--tx);font-size:12px;font-family:'Barlow',sans-serif;outline:none}
.comment-input:focus{border-color:var(--or)}
.comment-submit{padding:6px 12px;background:var(--or);border:none;border-radius:6px;color:#fff;font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:1px;cursor:pointer;flex-shrink:0}
.comment-submit:hover{opacity:.85}
.flags-panel{background:var(--cd);border:.5px solid var(--am);border-radius:8px;padding:12px;margin-top:14px}
.flags-title{font-size:10px;letter-spacing:3px;text-transform:uppercase;font-family:'IBM Plex Mono',monospace;color:var(--am);margin-bottom:8px}
.flag-item{font-size:11px;padding:5px 8px;background:var(--sf);border:.5px solid var(--bd);border-radius:5px;margin-bottom:4px;line-height:1.4;display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.flag-item .fi-text{flex:1;color:var(--tx)}
.flag-item .fi-remove{background:none;border:none;color:var(--di);cursor:pointer;font-size:11px;flex-shrink:0}
.flag-item .fi-remove:hover{color:var(--re)}
.copy-flags{margin-top:8px;padding:6px 14px;background:rgba(212,160,23,.1);border:.5px solid var(--am);border-radius:6px;color:var(--am);font-family:'IBM Plex Mono',monospace;font-size:11px;cursor:pointer}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--cd);border:.5px solid var(--bd);border-radius:12px;padding:24px;width:320px}
.modal h3{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--or);margin-bottom:4px}
.modal p{font-size:12px;color:var(--mu);margin-bottom:14px;line-height:1.5}
.modal-btns{display:flex;gap:8px;margin-top:4px}
.modal-btn{flex:1;padding:8px;border-radius:7px;border:.5px solid;font-size:12px;font-weight:500;cursor:pointer;font-family:'Barlow',sans-serif}
.modal-cancel{background:var(--sf);border-color:var(--bd);color:var(--mu)}
.modal-ok{background:var(--or);border-color:var(--or);color:#fff}
.modal-err{font-size:11px;color:var(--re);margin-top:6px;min-height:16px}

.chat-wrap{background:var(--sf);border:.5px solid var(--bd);border-radius:10px;padding:12px;margin-bottom:14px}
.chat-title{font-size:10px;letter-spacing:3px;text-transform:uppercase;font-family:'IBM Plex Mono',monospace;color:var(--mu);margin-bottom:10px}
.chat-msgs{max-height:200px;overflow-y:auto;margin-bottom:10px;display:flex;flex-direction:column;gap:6px}
.chat-msg{background:var(--cd);border:.5px solid var(--bd);border-radius:7px;padding:7px 10px;font-size:12px;line-height:1.5}
.chat-msg .cm-who{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:500;margin-bottom:2px}
.chat-msg .cm-text{color:var(--tx)}
.chat-msg .cm-time{font-size:9px;color:var(--di);margin-top:2px;font-family:'IBM Plex Mono',monospace}
.chat-msg .cm-del{float:right;background:none;border:none;color:var(--di);cursor:pointer;font-size:11px;padding:0;margin-left:6px}
.chat-msg .cm-del:hover{color:var(--re)}
.chat-empty{color:var(--di);font-style:italic;font-size:12px;text-align:center;padding:12px 0}
.chat-form{display:flex;gap:6px;align-items:center}
.chat-who-sel{padding:7px 8px;background:var(--cd);border:.5px solid var(--bd);border-radius:7px;color:var(--tx);font-size:12px;font-family:'IBM Plex Mono',monospace;outline:none;cursor:pointer;flex-shrink:0}
.chat-who-sel:focus{border-color:var(--or)}
.chat-input{flex:1;padding:7px 10px;background:var(--cd);border:.5px solid var(--bd);border-radius:7px;color:var(--tx);font-size:12px;font-family:'Barlow',sans-serif;outline:none}
.chat-input:focus{border-color:var(--or)}
.chat-input::placeholder{color:var(--di)}
.chat-send{padding:7px 14px;background:var(--or);border:none;border-radius:7px;color:#fff;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:1px;cursor:pointer;flex-shrink:0}
.chat-send:hover{opacity:.85}
.chat-locked{font-size:11px;color:var(--di);font-family:'IBM Plex Mono',monospace;text-align:center;padding:4px 0}
</style>
</head>

</div>

    </div>
  </div>
</div>

async function loadBin() {
  try {
    const r = await fetch(BIN_URL+'/latest', {headers:{'X-Master-Key':API_KEY,'X-Bin-Meta':'false'}});
    if(r.ok) {
      binData = await r.json();
      if(!binData.notes) binData.notes={};
      if(!binData.flags) binData.flags=[];
      if(!binData.chapenis_notes) binData.chapenis_notes={};
      if(!binData.puspus_notes) binData.puspus_notes={};
      if(!binData.comments) binData.comments={};
      if(!binData.chat) binData.chat=[];
    }
  } catch(e) { console.warn('Could not load bin:', e); }
}
async function saveBin() {
  try {
    const r = await fetch(BIN_URL, {method:'PUT', headers:{'Content-Type':'application/json','X-Master-Key':API_KEY}, body:JSON.stringify(binData)});
    return r.ok;
  } catch(e) { return false; }
}

function openModal(target) {
  modalTarget = target || 'chairman';
  const labels = {chairman:"Enter the Chairman's password.", chapenis:"Enter Chapin's password.", puspus:"Enter Rob's password."};
  document.getElementById('pw-modal-msg').textContent = labels[modalTarget] || labels.chairman;
  document.getElementById('pw-modal').classList.add('open');

  setTimeout(()=>document.getElementById('pw-input').focus(), 100);
}
function closeModal() { document.getElementById('pw-modal').classList.remove('open'); }
function checkPw() {
  const val = document.getElementById('pw-input').value;
  const correct =
    (modalTarget==='chairman' && val===EDITOR_PASSWORD) ||
    (modalTarget==='chapenis' && val===CHAPENIS_PASSWORD) ||
    (modalTarget==='puspus'   && val===PUSPUS_PASSWORD);
  if(correct) {
    if(modalTarget==='chairman') unlocked=true;
    if(modalTarget==='chapenis') chapUnlocked=true;
    if(modalTarget==='puspus')   pusPusUnlocked=true;
    closeModal();
    if(sel !== null) pick(H.findIndex(h=>h[0]===sel));
    renderChat();
  } else {
    document.getElementById('pw-err').textContent = 'Incorrect password.';
  }
}

// â”€â”€ Flags â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function flagKey(hero, type, text) { return hero+'||'+type+'||'+text.slice(0,60); }
function isFlagged(hero, type, text) {
  if(!binData.flags) return false;
  return binData.flags.some(f=>f.key===flagKey(hero,type,text));
}
async function toggleFlag(hero, type, text, btn) {
  if(!binData.flags) binData.flags=[];
  const k=flagKey(hero,type,text), idx=binData.flags.findIndex(f=>f.key===k);
  if(idx>=0) { binData.flags.splice(idx,1); btn.classList.remove('flagged'); }
  else { binData.flags.push({key:k,hero,type,text,ts:new Date().toISOString()}); btn.classList.add('flagged'); }
  await saveBin();
}
function flagAbility(idx, btn) {
  const hero=window.__abHero, text=window.__abs[idx];
  if(hero&&text) toggleFlag(hero,'ability',text,btn);
}
function flagsPanelHTML() {
  if(!binData.flags||!binData.flags.length) return '';
  return `<div class="flags-panel">
    <div class="flags-title">âš‘ Flagged as Incorrect (${binData.flags.length})</div>
    ${binData.flags.map(f=>`<div class="flag-item"><div class="fi-text"><strong>${f.hero}</strong> Â· ${f.type}<br>${f.text}</div><button class="fi-remove" onclick="removeFlag(${JSON.stringify(f.key)})">âœ•</button></div>`).join('')}
    <button class="copy-flags" onclick="copyFlags()">Copy all flags to clipboard</button>
  </div>`;
}
async function removeFlag(key) {
  binData.flags=binData.flags.filter(f=>f.key!==key);
  await saveBin();
  if(sel!==null) pick(H.findIndex(h=>h[0]===sel));
}
function copyFlags() {
  const text=binData.flags.map(f=>`[${f.hero}] (${f.type}) ${f.text}`).join('\n');
  navigator.clipboard.writeText(text).then(()=>alert('Flags copied! Paste them to share with Claude.'));
}

function makeRow(color, text, hero, type, itemName) {
  const flagged=isFlagged(hero,type,text);
  const tip=itemName&&ITEM_DESCS[itemName]?`<span class="tip">${ITEM_DESCS[itemName]}</span>`:'';
  const dt=itemName?'data-tip="1"':'';
  return `<div class="row" ${dt}>
    <div class="dot" style="background:${color}"></div>
    <div style="flex:1;font-size:11px">${text}${tip}</div>
    <button class="flag-btn${flagged?' flagged':''}" title="${flagged?'Remove flag':'Flag as incorrect'}"
      onclick="toggleFlag('${hero.replace(/'/g,"\'")}',${JSON.stringify(type)},${JSON.stringify(text)},this)">âš‘</button>
  </div>`;
}

      </div>
      ${isOpen
        ?`<textarea class="notes-edit" id="notes-ta-${safeKey}" placeholder="Write your notes on ${hero} here...">${note}</textarea>
          <button class="notes-save" onclick="saveNote('${safe}','${key}')">Save</button>`
        :`<div class="dude-note-text${!note?' empty':''}">${note||"No notes yet. Hit ðŸ”’ Edit to add some."}</div>`}
      ${chairComment}
    </div>`;
  }).join('');
}
async function addComment(noteKey, hero, inputEl) {
  const text=inputEl.value.trim(); if(!text) return;
  const ck=noteKey+'_'+hero;
  if(!binData.comments[ck]) binData.comments[ck]=[];
  binData.comments[ck].push({text,ts:new Date().toISOString()});
  inputEl.value='';
  await saveBin();
  pick(H.findIndex(h=>h[0]===hero));
}
async function deleteComment(noteKey, hero, idx) {
  const ck=noteKey+'_'+hero;
  if(binData.comments[ck]) binData.comments[ck].splice(idx,1);
  await saveBin();
  pick(H.findIndex(h=>h[0]===hero));
}


// â”€â”€ Chat â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
const WHO_COLORS = {chairman:'var(--or)', chapin:'var(--bl)', rob:'var(--gr)'};
const WHO_LABELS = {chairman:'Chairman', chapin:'Chapin', rob:'Rob'};
const WHO_PASS   = {chairman:EDITOR_PASSWORD, chapin:CHAPENIS_PASSWORD, rob:PUSPUS_PASSWORD};

function chatUnlocked(who) {
  if(who==='chairman') return unlocked;
  if(who==='chapin')   return chapUnlocked;
  if(who==='rob')      return pusPusUnlocked;
  return false;
}

function renderChat() {
  const msgs = (binData.chat||[]);
  const box = document.getElementById('chat-msgs');
  if(!box) return;
  if(!msgs.length) {
    box.innerHTML = '<div class="chat-empty">No messages yet â€” say something!</div>';
  } else {
    box.innerHTML = msgs.map((m,i)=>`
      <div class="chat-msg">
        <div class="cm-who" style="color:${WHO_COLORS[m.who]||'var(--mu)'}">${WHO_LABELS[m.who]||m.who}
          ${(m.who==='chairman'&&unlocked)||(m.who==='chapin'&&chapUnlocked)||(m.who==='rob'&&pusPusUnlocked)
            ?`<button class="cm-del" onclick="deleteChat(${i})">âœ•</button>`:''}
        </div>
        <div class="cm-text">${m.text}</div>
        <div class="cm-time">${new Date(m.ts).toLocaleString()}</div>
      </div>`).join('');
    // auto-scroll to bottom
    box.scrollTop = box.scrollHeight;
  }
  // update lock hint
  const sel = document.getElementById('chat-who');
  const lockMsg = document.getElementById('chat-lock-msg');
  if(sel && lockMsg) {
    const who = sel.value;
    lockMsg.textContent = chatUnlocked(who) ? '' : `Unlock as ${WHO_LABELS[who]} to send messages`;
  }
}

async function sendChat() {
  const whoEl = document.getElementById('chat-who');
  const inputEl = document.getElementById('chat-input');
  if(!whoEl||!inputEl) return;
  const who = whoEl.value;
  const text = inputEl.value.trim();
  if(!text) return;
  if(!chatUnlocked(who)) {
    openModal(who==='chapin'?'chapenis':who);
    return;
  }
  if(!binData.chat) binData.chat=[];
  binData.chat.push({who, text, ts:new Date().toISOString()});
  inputEl.value='';
  renderChat();
  await saveBin();
}

async function deleteChat(idx) {
  if(!binData.chat) return;
  binData.chat.splice(idx,1);
  renderChat();
  await saveBin();
}
