<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Deadlock — The Dudemen's Study Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0e10;--sf:#141618;--cd:#1a1c20;--bd:#2a2d33;--b2:#444;--or:#e8622a;--re:#E24B4A;--gr:#4caf6a;--am:#d4a017;--bl:#378ADD;--pu:#7F77DD;--tx:#e8e6df;--mu:#888;--di:#555}
body{background:var(--bg);color:var(--tx);font-family:'Barlow',sans-serif;font-size:15px;min-height:100vh}
#app{max-width:820px;margin:0 auto;padding:14px 12px}
.hdr{text-align:center;padding:16px 0 12px;border-bottom:.5px solid var(--bd);margin-bottom:14px}
.hdr h1{font-family:'Bebas Neue',sans-serif;font-size:40px;letter-spacing:4px;color:var(--or);line-height:1}
.hdr p{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:4px;color:var(--mu);margin-top:3px;text-transform:uppercase}
input,textarea{font-family:'Barlow',sans-serif}
input[type=text],input[type=password]{width:100%;padding:8px 12px;background:var(--sf);border:.5px solid var(--bd);border-radius:7px;color:var(--tx);font-size:14px;outline:none;margin-bottom:10px}
input[type=text]:focus,input[type=password]:focus{border-color:var(--or)}
input[type=text]::placeholder,input[type=password]::placeholder{color:var(--di)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:6px;margin-bottom:14px}
.hc{border:.5px solid var(--bd);border-radius:8px;overflow:hidden;cursor:pointer;background:var(--sf);transition:all .12s}
.hc:hover{border-color:var(--b2);transform:translateY(-1px)}
.hc.sel{border-color:var(--or);box-shadow:0 0 0 1px var(--or)}
.hc.noted{border-color:#d4a017;box-shadow:0 0 0 1px #d4a017,0 0 8px rgba(212,160,23,.35)}
.hc img{width:100%;aspect-ratio:3/4;object-fit:cover;display:block}
.hc .nm{font-size:9px;font-weight:500;padding:3px 4px 2px;line-height:1.2}
.hc .rl{font-size:8px;color:var(--mu);font-family:'IBM Plex Mono',monospace;padding-bottom:3px}
.res{background:var(--sf);border:.5px solid var(--bd);border-radius:10px;padding:14px}
.rh{display:flex;gap:10px;align-items:flex-start;padding-bottom:12px;border-bottom:.5px solid var(--bd);margin-bottom:12px}
.rh img{width:60px;height:80px;border-radius:7px;object-fit:cover;flex-shrink:0;margin-top:2px}
.rn{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;line-height:1}
.rr{font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--mu);letter-spacing:2px;text-transform:uppercase;margin-top:2px;margin-bottom:8px}
.ab-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.ab-pill{background:var(--cd);border:.5px solid var(--bd);border-radius:5px;padding:5px 7px;display:flex;gap:6px;align-items:flex-start;position:relative;padding-right:22px}
.ab-key{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--or);background:rgba(232,98,42,.12);padding:1px 5px;border-radius:3px;flex-shrink:0;margin-top:1px}
.ab-name{font-size:10px;font-weight:500;color:var(--tx);line-height:1.3}
.ab-desc{font-size:9px;color:var(--mu);margin-top:1px;line-height:1.3}
.ab-flag{background:none;border:none;cursor:pointer;font-size:10px;color:var(--di);padding:0;position:absolute;top:4px;right:4px;transition:color .12s}
.ab-flag:hover{color:var(--re)}
.ab-flag.flagged{color:var(--re)}
.tb{background:rgba(232,98,42,.06);border:.5px solid rgba(232,98,42,.2);border-radius:6px;padding:8px 10px;font-size:12px;line-height:1.5;margin-bottom:10px}
.tl{font-size:9px;font-family:'IBM Plex Mono',monospace;letter-spacing:2px;text-transform:uppercase;color:var(--or);margin-bottom:3px}
.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.secl{font-size:9px;letter-spacing:2px;text-transform:uppercase;font-family:'IBM Plex Mono',monospace;color:var(--mu);margin-bottom:6px}
.row{display:flex;gap:6px;align-items:flex-start;padding:6px 8px;background:var(--cd);border:.5px solid var(--bd);border-radius:6px;margin-bottom:4px;font-size:11px;line-height:1.3;position:relative}
.dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:4px}
.flag-btn{background:none;border:none;cursor:pointer;font-size:13px;color:var(--di);padding:0 0 0 6px;flex-shrink:0;transition:color .12s;line-height:1}
.flag-btn:hover{color:var(--re)}
.flag-btn.flagged{color:var(--re)}
[data-tip]{cursor:help}
.tip{display:none;position:absolute;left:0;bottom:calc(100% + 4px);background:#0d0e10;border:.5px solid var(--or);border-radius:6px;padding:7px 11px;font-size:11px;color:var(--tx);white-space:normal;max-width:260px;z-index:50;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.7);line-height:1.5}
[data-tip]:hover .tip{display:block}
.ph{text-align:center;padding:28px;color:var(--di);font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:2px}
.notes-wrap{margin-top:14px;background:var(--cd);border:.5px solid var(--bd);border-radius:8px;padding:12px}
.notes-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.notes-title{font-size:10px;letter-spacing:3px;text-transform:uppercase;font-family:'IBM Plex Mono',monospace;color:var(--mu)}
.notes-actions{display:flex;gap:6px;align-items:center}
.lock-btn{background:none;border:.5px solid var(--bd);border-radius:5px;color:var(--mu);cursor:pointer;font-size:11px;padding:3px 8px;font-family:'IBM Plex Mono',monospace}
.lock-btn:hover{border-color:var(--b2);color:var(--tx)}
.lock-btn.unlocked{border-color:var(--or);color:var(--or)}
.notes-content{font-size:12px;line-height:1.6;color:var(--tx);white-space:pre-wrap;min-height:40px}
.notes-content.empty{color:var(--di);font-style:italic}
textarea.notes-edit{width:100%;background:var(--sf);border:.5px solid var(--or);border-radius:6px;color:var(--tx);font-size:12px;line-height:1.6;padding:8px;outline:none;resize:vertical;min-height:80px}
.notes-save{margin-top:6px;padding:6px 14px;background:var(--or);border:none;border-radius:6px;color:#fff;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:1px;cursor:pointer}
.notes-save:hover{opacity:.85}
.notes-sync{font-size:9px;font-family:'IBM Plex Mono',monospace;color:var(--di);margin-left:6px}
.dude-notes-wrap{margin-top:8px;background:var(--cd);border:.5px solid var(--bd);border-radius:8px;padding:12px}
.dude-notes-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.dude-notes-title{font-size:10px;letter-spacing:3px;text-transform:uppercase;font-family:'IBM Plex Mono',monospace;color:var(--mu)}
.dude-note-text{font-size:12px;line-height:1.6;color:var(--tx);white-space:pre-wrap;min-height:32px}
.dude-note-text.empty{color:var(--di);font-style:italic}
.comment-wrap{margin-top:10px;padding-top:10px;border-top:.5px solid var(--bd)}
.comment-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;font-family:'IBM Plex Mono',monospace;color:var(--mu);margin-bottom:6px}
.comment-list{margin-bottom:8px}
.comment-item{background:var(--sf);border:.5px solid var(--bd);border-radius:6px;padding:7px 10px;margin-bottom:5px;font-size:11px;line-height:1.5;color:var(--tx);position:relative}
.comment-item .c-del{position:absolute;top:6px;right:8px;background:none;border:none;color:var(--di);cursor:pointer;font-size:11px}
.comment-item .c-del:hover{color:var(--re)}
.comment-form{display:flex;gap:6px}
.comment-input{flex:1;padding:6px 10px;background:var(--sf);border:.5px solid var(--bd);border-radius:6px;color:var(--tx);font-size:12px;font-family:'Barlow',sans-serif;outline:none}
.comment-input:focus{border-color:var(--or)}
.comment-submit{padding:6px 12px;background:var(--or);border:none;border-radius:6px;color:#fff;font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:1px;cursor:pointer;flex-shrink:0}
.comment-submit:hover{opacity:.85}
.flags-panel{background:var(--cd);border:.5px solid var(--am);border-radius:8px;padding:12px;margin-top:14px}
.flags-title{font-size:10px;letter-spacing:3px;text-transform:uppercase;font-family:'IBM Plex Mono',monospace;color:var(--am);margin-bottom:8px}
.flag-item{font-size:11px;padding:5px 8px;background:var(--sf);border:.5px solid var(--bd);border-radius:5px;margin-bottom:4px;line-height:1.4;display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.flag-item .fi-text{flex:1;color:var(--tx)}
.flag-item .fi-remove{background:none;border:none;color:var(--di);cursor:pointer;font-size:11px;flex-shrink:0}
.flag-item .fi-remove:hover{color:var(--re)}
.copy-flags{margin-top:8px;padding:6px 14px;background:rgba(212,160,23,.1);border:.5px solid var(--am);border-radius:6px;color:var(--am);font-family:'IBM Plex Mono',monospace;font-size:11px;cursor:pointer}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--cd);border:.5px solid var(--bd);border-radius:12px;padding:24px;width:320px}
.modal h3{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--or);margin-bottom:4px}
.modal p{font-size:12px;color:var(--mu);margin-bottom:14px;line-height:1.5}
.modal-btns{display:flex;gap:8px;margin-top:4px}
.modal-btn{flex:1;padding:8px;border-radius:7px;border:.5px solid;font-size:12px;font-weight:500;cursor:pointer;font-family:'Barlow',sans-serif}
.modal-cancel{background:var(--sf);border-color:var(--bd);color:var(--mu)}
.modal-ok{background:var(--or);border-color:var(--or);color:#fff}
.modal-err{font-size:11px;color:var(--re);margin-top:6px;min-height:16px}

@import url('https://fonts.googleapis.com/css2?family=Caveat:wght@500;600&display=swap');
.chalk-wrap{background:#2d4a2d;border:3px solid #5a3e28;border-radius:4px;padding:16px;margin-bottom:14px;box-shadow:inset 0 0 40px rgba(0,0,0,.4),2px 2px 8px rgba(0,0,0,.6);position:relative}
.chalk-wrap::before{content:'';position:absolute;inset:3px;border:1px solid rgba(255,255,255,.06);border-radius:2px;pointer-events:none}
.chalk-title{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:4px;color:rgba(255,255,255,.5);text-align:center;margin-bottom:14px;text-shadow:0 0 8px rgba(255,255,255,.15)}
.chalk-cols{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:rgba(255,255,255,.1)}
.chalk-col{background:#2d4a2d;padding:12px 10px}
.chalk-col-name{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:3px;color:rgba(255,255,255,.6);margin-bottom:10px;text-align:center;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,.15);text-shadow:0 0 6px rgba(255,255,255,.1)}
.chalk-goal{font-family:'Caveat',cursive;font-size:18px;color:rgba(255,255,255,.88);line-height:1.4;text-shadow:0 0 3px rgba(255,255,255,.2);min-height:28px;word-break:break-word}
.chalk-goal.empty{color:rgba(255,255,255,.2);font-style:italic;font-size:15px}
.chalk-done-btn{margin-top:10px;background:none;border:1px dashed rgba(255,255,255,.25);border-radius:3px;color:rgba(255,255,255,.4);font-family:'IBM Plex Mono',monospace;font-size:10px;padding:3px 8px;cursor:pointer;letter-spacing:1px;width:100%;transition:all .15s}
.chalk-done-btn:hover{border-color:rgba(255,255,255,.5);color:rgba(255,255,255,.7)}
.chalk-edit-area{width:100%;background:transparent;border:none;border-bottom:1px dashed rgba(255,255,255,.3);color:rgba(255,255,255,.9);font-family:'Caveat',cursive;font-size:18px;outline:none;resize:none;line-height:1.4;text-shadow:0 0 3px rgba(255,255,255,.2);padding:2px 0}
.chalk-edit-area::placeholder{color:rgba(255,255,255,.2)}
.chalk-btns{display:flex;gap:6px;margin-top:8px}
.chalk-save{flex:1;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:3px;color:rgba(255,255,255,.7);font-family:'IBM Plex Mono',monospace;font-size:10px;padding:4px;cursor:pointer;letter-spacing:1px;transition:all .15s}
.chalk-save:hover{background:rgba(255,255,255,.2);color:#fff}
.chalk-cancel{flex:1;background:none;border:1px solid rgba(255,255,255,.1);border-radius:3px;color:rgba(255,255,255,.3);font-family:'IBM Plex Mono',monospace;font-size:10px;padding:4px;cursor:pointer;letter-spacing:1px}
.chalk-lock{background:none;border:none;color:rgba(255,255,255,.3);font-family:'IBM Plex Mono',monospace;font-size:10px;cursor:pointer;padding:0;margin-top:6px;display:block;text-align:center;width:100%;letter-spacing:1px;transition:color .15s}
.chalk-lock:hover{color:rgba(255,255,255,.6)}
.chalk-lock.editing{color:rgba(232,98,42,.8)}
.chalk-completed{margin-top:14px;padding-top:12px;border-top:1px solid rgba(255,255,255,.1)}
.chalk-completed-title{font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:3px;color:rgba(255,255,255,.3);margin-bottom:8px}
.chalk-completed-cols{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.chalk-completed-col{}
.chalk-completed-name{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:2px;color:rgba(255,255,255,.25);margin-bottom:4px}
.chalk-completed-item{font-family:'Caveat',cursive;font-size:14px;color:rgba(255,255,255,.35);line-height:1.4;text-decoration:line-through;padding:2px 0;display:flex;align-items:flex-start;gap:5px}
.chalk-completed-item::before{content:'✓';font-family:'IBM Plex Mono',monospace;font-size:10px;flex-shrink:0;margin-top:2px}

.dudephoto-wrap{text-align:center;margin-bottom:10px;position:relative}
.dudephoto-wrap img{width:110px;height:110px;object-fit:cover;border-radius:50%;display:block;margin:0 auto 3px;border:3px solid rgba(255,255,255,.15);transition:transform .2s,box-shadow .2s;cursor:zoom-in}
.dudephoto-wrap img:hover{transform:scale(2.8);z-index:99;border-radius:10px;box-shadow:0 8px 40px rgba(0,0,0,.8)}
.cp-bar{display:flex;gap:8px;margin-bottom:10px;align-items:center}
.cp-bar input{margin-bottom:0}
.cp-toggle{flex-shrink:0;padding:8px 14px;background:var(--sf);border:.5px solid var(--bd);border-radius:7px;color:var(--mu);font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;cursor:pointer;transition:all .15s}
.cp-toggle:hover{border-color:var(--b2);color:var(--tx)}
.cp-toggle.on{background:rgba(232,98,42,.12);border-color:var(--or);color:var(--or)}
.hc.cpsel{border-color:var(--re);box-shadow:0 0 0 1px var(--re),0 0 10px rgba(226,75,74,.4)}
.cp-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.cp-count{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--mu);text-transform:uppercase}
.cp-clear{background:none;border:.5px solid var(--bd);border-radius:5px;color:var(--mu);font-family:'IBM Plex Mono',monospace;font-size:10px;padding:3px 10px;cursor:pointer}
.cp-clear:hover{border-color:var(--re);color:var(--re)}
.cp-card{background:var(--sf);border:.5px solid var(--bd);border-radius:9px;padding:10px 12px;margin-bottom:8px}
.cp-empty{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--di);letter-spacing:1px;padding:8px 0}
.cp-sect{font-size:16px;font-weight:700;color:var(--gr);letter-spacing:3px;border-bottom:1px solid var(--gr);padding-bottom:4px}
.cp-suggest{margin-top:14px;background:var(--sf);border:.5px dashed var(--bd);border-radius:9px;padding:10px 12px}
.cp-sug-input{width:100%;min-height:44px;background:var(--cd);border:.5px solid var(--bd);border-radius:6px;color:var(--tx);font-family:inherit;font-size:12px;padding:7px;resize:vertical;margin:6px 0}
.cp-sug-item{display:flex;gap:8px;align-items:flex-start;font-size:11px;line-height:1.4;padding:5px 8px;background:var(--cd);border:.5px solid var(--bd);border-radius:5px;margin-top:5px}
.cp-sug-add{background:rgba(76,175,106,.08);border:.5px solid var(--gr);border-radius:5px;color:var(--gr);font-family:'IBM Plex Mono',monospace;font-size:10px;padding:3px 10px;cursor:pointer;letter-spacing:1px}
.cp-arrow{color:var(--di);font-size:11px}
.cp-card.top{border-color:var(--or);box-shadow:0 0 0 1px rgba(232,98,42,.3)}
.cp-item-row{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;margin-bottom:6px}
.cp-item-name{font-family:'Bebas Neue',sans-serif;font-size:22px;font-weight:700;letter-spacing:1px}
.cp-chain-sm{font-family:'Bebas Neue',sans-serif;font-size:12px;text-transform:uppercase;letter-spacing:1px;cursor:help}
.cp-chain-line{display:flex;flex-wrap:wrap;gap:4px;align-items:center;margin-bottom:2px}
.cp-cat{font-size:9px;font-family:'IBM Plex Mono',monospace;padding:1px 6px;border-radius:3px}
.cp-cost{font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--am)}
.cp-cov{margin-left:auto;font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--or)}
.cp-why{display:flex;gap:7px;align-items:flex-start;padding:4px 0;border-top:.5px solid var(--bd);font-size:11px;line-height:1.4}
.cp-why img{width:22px;height:28px;border-radius:4px;object-fit:cover;flex-shrink:0}
.cp-why .w-hero{font-weight:500;color:var(--tx)}
.cp-why .w-text{color:var(--mu)}
</style>
</head>
<body>
<div id="app">
<div class="hdr"><h1>DEADLOCK</h1><p>The Dudemen's Study Guide &middot; 38 Heroes</p><div style="display:flex;align-items:center;justify-content:center;gap:12px;margin-top:6px"><div id="global-sync" style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:#555;letter-spacing:1px">● connecting...</div><button onclick="copyAllFlags()" style="background:rgba(212,160,23,.1);border:.5px solid #d4a017;border-radius:5px;color:#d4a017;font-family:'IBM Plex Mono',monospace;font-size:10px;padding:3px 10px;cursor:pointer;letter-spacing:1px">⚑ Copy all flags</button><button onclick="clearAllFlags()" style="background:rgba(226,75,74,.08);border:.5px solid #E24B4A;border-radius:5px;color:#E24B4A;font-family:'IBM Plex Mono',monospace;font-size:10px;padding:3px 10px;cursor:pointer;letter-spacing:1px">✕ Clear all flags</button></div></div>
<div id="p0">
  <div class="chalk-wrap">
    <div class="chalk-title">CURRENT FOCUS</div>
    <div class="chalk-cols" id="chalk-cols"></div>

  </div>
  <div class="cp-bar">
    <input type="text" id="srch" placeholder="Search heroes..." oninput="renderGrid()" style="flex:1">

    <input type="file" id="cp-shot-input" accept="image/*" style="display:none" onchange="cpScanFile(event)">
  </div>
  <div class="grid" id="grid"></div>
  <div id="cp-results" style="display:none"></div>
  <div id="res"><div class="ph">Pick an enemy hero above</div></div>
</div>
</div>

<!-- Password Modal -->
<div class="modal-bg" id="pw-modal">
  <div class="modal">
    <h3>Unlock Editing</h3>
    <p id="pw-modal-msg">Enter your password to edit your notes.</p>
    <input type="password" id="pw-input" placeholder="Password..." onkeydown="if(event.key==='Enter')checkPw()">

    </div>
  </div>
</div>

<script>
const BIN_ID  = '6a2039d5f5f4af5e29b2d34b';
const API_KEY = '$2a$10$xN0NFn7iLT2QLN3kjweAZOo5K77sve8wvXkOJ3JnALA9bmbYScUMS';
const EDITOR_PASSWORD    = 'kong';
const CHAPENIS_PASSWORD  = 'chapenis';

let sel=null, unlocked=false, chapUnlocked=false, pusPusUnlocked=false, modalTarget='chairman';
let binData = {notes:{}, flags:[], chapenis_notes:{}, puspus_notes:{}, comments:{}};

// ── JSONBin ───────────────────────────────────────────────────────────────
async function loadBin() {
  try {
    const r = await fetch(BIN_URL+'/latest', {
      headers:{'X-Master-Key':API_KEY,'X-Access-Key':API_KEY,'X-Bin-Meta':'false'}
    });
    if(r.ok) {
      binData = await r.json();
      if(!binData.notes) binData.notes={};
      if(!binData.flags) binData.flags=[];
      if(!binData.chapenis_notes) binData.chapenis_notes={};
      if(!binData.puspus_notes) binData.puspus_notes={};
      if(!binData.comments) binData.comments={};
      if(!binData.goals) binData.goals={};
      if(!binData.completed_goals) binData.completed_goals={chairman:[],chapin:[],rob:[]};
      if(!binData.goal_completed_at) binData.goal_completed_at={};
      if(!binData.goal_set_at) binData.goal_set_at={};
      setSyncStatus('connected', '● connected');
    } else {
      const err = await r.text();
      console.error('JSONBin load failed:', r.status, err);
      setSyncStatus('error', '● sync error '+r.status);
    }
  } catch(e) {
    console.warn('Could not load bin:', e);
    setSyncStatus('error', '● offline');
  }
}
async function saveBin() {
  try {
    const r = await fetch(BIN_URL, {
      method:'PUT',
      headers:{'Content-Type':'application/json','X-Master-Key':API_KEY,'X-Access-Key':API_KEY},
      body:JSON.stringify(binData)
    });
    if(!r.ok) {
      const err = await r.text();
      console.error('JSONBin save failed:', r.status, err);
    }
    return r.ok;
  } catch(e) {
    console.error('JSONBin save error:', e);
    return false;
  }
}
function setSyncStatus(state, msg) {
  const el = document.getElementById('global-sync');
  if(!el) return;
  el.textContent = msg;
  el.style.color = state==='connected' ? '#4caf6a' : state==='error' ? '#E24B4A' : '#888';
}

// ── Password ──────────────────────────────────────────────────────────────
function openModal(target) {
  modalTarget = target || 'chairman';
  const labels = {chairman:"Enter the Chairman's password.", chapenis:"Enter Chapin's password.", puspus:"Enter Rob's password.", cpsuggest:"Item suggestions are Chairman/Chapin only. Enter your password."};
  document.getElementById('pw-modal-msg').textContent = labels[modalTarget] || labels.chairman;
  document.getElementById('pw-modal').classList.add('open');
  document.getElementById('pw-input').value = '';
  document.getElementById('pw-err').textContent = '';
  setTimeout(()=>document.getElementById('pw-input').focus(), 100);
}
function closeModal() { document.getElementById('pw-modal').classList.remove('open'); }
function checkPw() {
  const val = document.getElementById('pw-input').value;
  const correct =
    (modalTarget==='chairman' && val===EDITOR_PASSWORD) ||
    (modalTarget==='chapenis' && val===CHAPENIS_PASSWORD) ||
    (modalTarget==='puspus'   && val===PUSPUS_PASSWORD) ||
    (modalTarget==='cpsuggest' && (val===EDITOR_PASSWORD || val===CHAPENIS_PASSWORD));
  if(correct) {
    if(modalTarget==='chairman') unlocked=true;
    if(modalTarget==='chapenis') chapUnlocked=true;
    if(modalTarget==='puspus')   pusPusUnlocked=true;
    if(modalTarget==='cpsuggest') { if(val===EDITOR_PASSWORD) unlocked=true; else chapUnlocked=true; }
    closeModal();
    if(sel !== null) pick(H.findIndex(h=>h[0]===sel));
    renderChalk();
    if(cpMode) cpRender();
  } else {
    document.getElementById('pw-err').textContent = 'Incorrect password.';
  }
}
function lockNotes(target) {
  const idMap   = {chairman:'chairman', chapenis:'chapenis', puspus:'puspus'};
  const keyMap  = {chairman:'notes', chapenis:'chapenis_notes', puspus:'puspus_notes'};
  const elemId  = idMap[target];
  const storeKey = keyMap[target];
  if(elemId && storeKey && sel !== null) {
    const ta = document.getElementById('notes-ta-'+elemId);
    if(ta) saveNote(H.find(h=>h[0]===sel)[0], storeKey, elemId);
  }
  if(!target||target==='chairman') unlocked=false;
  if(target==='chapenis') chapUnlocked=false;
  if(target==='puspus')   pusPusUnlocked=false;
  if(sel !== null) pick(H.findIndex(h=>h[0]===sel));
}

// ── Flags ─────────────────────────────────────────────────────────────────
function flagKey(hero, type, text) { return hero+'||'+type+'||'+text.slice(0,60); }
function isFlagged(hero, type, text) {
  if(!binData.flags) return false;
  return binData.flags.some(f=>f.key===flagKey(hero,type,text));
}
async function toggleFlag(hero, type, text, btn, note) {
  if(!binData.flags) binData.flags=[];
  const k=flagKey(hero,type,text), idx=binData.flags.findIndex(f=>f.key===k);
  if(idx>=0) { binData.flags.splice(idx,1); btn.classList.remove('flagged'); }
  else {
    const f={key:k,hero,type,text,ts:new Date().toISOString()};
    if(note) f.note=note;
    binData.flags.push(f); btn.classList.add('flagged');
  }
  await saveBin();
}
function flagAbility(idx, btn) {
  const hero=window.__abHero, text=window.__abs[idx];
  if(hero&&text) toggleFlag(hero,'ability',text,btn);
}
function toggleFlagByRow(idx, btn) {
  if(!window.__rowData||idx>=window.__rowData.length) return;
  const {hero,type,text}=window.__rowData[idx];
  toggleFlag(hero,type,text,btn);
}
function flagsPanelHTML() {
  if(!binData.flags||!binData.flags.length) return '';
  window.__flags = binData.flags;
  return `<div class="flags-panel">
    <div class="flags-title">⚑ Flagged as Incorrect (${binData.flags.length})</div>
    ${binData.flags.map((f,fi)=>`<div class="flag-item"><div class="fi-text"><strong>${f.hero}</strong> · ${f.type}<br>${f.text}${f.note?`<br><em style="color:var(--am)">✎ ${f.note}</em>`:''}</div><button class="fi-remove" onclick="removeFlagByIndex(${fi})">✕</button></div>`).join('')}
    <button class="copy-flags" onclick="copyFlags()">Copy all flags to clipboard</button>
  </div>`;
}
async function removeFlag(key) {
  binData.flags=binData.flags.filter(f=>f.key!==key);
  await saveBin();
  if(sel!==null) pick(H.findIndex(h=>h[0]===sel));
}
async function removeFlagByIndex(idx) {
  if(!window.__flags||idx>=window.__flags.length) return;
  const key = window.__flags[idx].key;
  await removeFlag(key);
}
function copyFlags() {
  const text=binData.flags.map(f=>`[${f.hero}] (${f.type}) ${f.text}`+(f.note?`\n  NOTE: ${f.note}`:'')).join('\n');
  navigator.clipboard.writeText(text).then(()=>alert('Flags copied! Paste them to share with Claude.'));
}
function copyAllFlags() {
  if(!binData.flags||!binData.flags.length) { alert('No flags yet — click the ⚑ button on any incorrect info to flag it.'); return; }
  const text = '=== DEADLOCK GUIDE FLAGS ===\n\n' + binData.flags.map(f=>`[${f.hero}] (${f.type})\n${f.text}`+(f.note?`\nNOTE: ${f.note}`:'')).join('\n\n');
  navigator.clipboard.writeText(text).then(()=>alert(`Copied ${binData.flags.length} flag(s) to clipboard! Paste them to Claude.`));
}
async function clearAllFlags() {
  if(!binData.flags||!binData.flags.length) { alert('No flags to clear.'); return; }
  const pw = prompt('Enter Chairman password to clear all flags:');
  if(pw !== EDITOR_PASSWORD) { alert('Incorrect password.'); return; }
  const count = binData.flags.length;
  binData.flags = [];
  const ok = await saveBin();
  if(ok) {
    alert(`Cleared ${count} flag(s).`);
    if(sel !== null) pick(H.findIndex(h=>h[0]===sel));
  } else {
    alert('Save failed — flags not cleared.');
  }
}

// ── Item tooltip ──────────────────────────────────────────────────────────
function itemTipHTML(itemName) {
  if(!itemName||!ITEM_DESCS[itemName]) return '';
  const cost=ITEM_COSTS[itemName], tree=ITEM_TREE[itemName]||{};
  const fmt=list=>list.map(([n,c])=>n+(c?` (${c.toLocaleString()})`:'')).join(', ');
  return `<span class="tip">${ITEM_DESCS[itemName]}
    ${cost?`<br><span style="color:var(--am)">${cost.toLocaleString()} souls</span>`:''}
    ${tree.from?`<br><span style="color:var(--mu)">Builds from: ${fmt(tree.from)}</span>`:''}
    ${tree.into?`<br><span style="color:var(--gr)">Upgrades into: ${fmt(tree.into)}</span>`:''}</span>`;
}
function makeRow(color, text, hero, type, itemName) {
  if(!window.__rowData) window.__rowData=[];
  const ri = window.__rowData.length;
  window.__rowData.push({hero, type, text});
  const flagged=isFlagged(hero,type,text);
  const tip=itemTipHTML(itemName);
  const dt=tip?'data-tip="1"':'';
  return `<div class="row" ${dt}>
    <div class="dot" style="background:${color}"></div>
    <div style="flex:1;font-size:11px">${text}${tip}</div>
    <button class="flag-btn${flagged?' flagged':''}" title="${flagged?'Remove flag':'Flag as incorrect'}"
      onclick="toggleFlagByRow(${ri},this)">⚑</button>
  </div>`;
}


// ── Autosave ──────────────────────────────────────────────────────────────
const _saveTimers = {};
function autoSave(hero, storageKey, elemId) {
  const timerKey = storageKey + '_' + hero;
  clearTimeout(_saveTimers[timerKey]);
  const sync = document.getElementById('nsync-' + elemId);
  if(sync) sync.textContent = 'typing...';
  _saveTimers[timerKey] = setTimeout(() => saveNote(hero, storageKey, elemId), 1200);
}

// ── Notes ─────────────────────────────────────────────────────────────────
async function saveNote(hero, storageKey, elemId) {
  if(!binData[storageKey]) binData[storageKey]={};
  const ta=document.getElementById('notes-ta-'+elemId);
  if(!ta) { console.error('saveNote: textarea not found: notes-ta-'+elemId); return; }
  binData[storageKey][hero]=ta.value;
  const sync=document.getElementById('nsync-'+elemId);
  if(sync) sync.textContent='saving...';
  const ok=await saveBin();
  if(sync) sync.textContent=ok?'saved ✓':'error ✗';
}

// ── Shame photo tiers ─────────────────────────────────────────────────────
function getPhotoTier(key) {
  const completedTs = binData.goal_completed_at && binData.goal_completed_at[key];
  const setTs = binData.goal_set_at && binData.goal_set_at[key];
  const hasGoal = binData.goals && (binData.goals[key]||'').trim();

  // God tier: completed a goal less than 5 days ago
  if(completedTs) {
    const d = (Date.now() - new Date(completedTs).getTime()) / 86400000;
    if(d < 5) return 'god';
  }

  // If they have a goal set but no timestamp at all = they've been ignoring it = shit tier
  if(hasGoal && !setTs && !completedTs) return 'shit';

  const baseline = completedTs && setTs
    ? (new Date(completedTs) > new Date(setTs) ? completedTs : setTs)
    : (completedTs || setTs);
  if(!baseline) return 'normal';
  const days = (Date.now() - new Date(baseline).getTime()) / 86400000;
  if(days < 10) return 'normal';
  return 'shit';
}
function memberPhotoHTML(key) {
  const p = MEMBER_PHOTOS[key];
  if(!p) return '';
  const tier = getPhotoTier(key);
  const src = p[tier] || p.normal;
  const borderStyle = tier==='god'  ? 'border-color:#d4a017;box-shadow:0 0 12px rgba(212,160,23,.5)'
                    : tier==='shit' ? 'border-color:#E24B4A;box-shadow:0 0 12px rgba(226,75,74,.4)'
                    : '';
  const lbl = tier==='god'  ? '<div style="font-size:11px;letter-spacing:2px;color:#d4a017;margin-top:3px">🌟 S TIER</div>'
             : tier==='shit' ? '<div style="font-size:11px;letter-spacing:2px;color:#E24B4A;margin-top:3px">💩 SHIT TIER</div>'
             : '';
  return `<div class="dudephoto-wrap">
    <img src="${src}" style="${borderStyle}">
    ${lbl}
  </div>`;
}

// pixel-matching scan: compare portrait crops against the embedded in-game art
function cpLoadImg(src){ return new Promise((res,rej)=>{ const i=new Image(); i.onload=()=>res(i); i.onerror=()=>rej(new Error('could not read image')); i.src=src; }); }
const CP_G=12;
function cpVec(src,sx,sy,sw,sh){
  const c=document.createElement('canvas'); c.width=CP_G; c.height=CP_G;
  const ctx=c.getContext('2d');
  ctx.drawImage(src,Math.max(0,sx),Math.max(0,sy),sw,sh,0,0,CP_G,CP_G);
  const d=ctx.getImageData(0,0,CP_G,CP_G).data;
  const N=CP_G*CP_G;
  let mr=0,mg=0,mb=0;
  for(let i=0;i<d.length;i+=4){ mr+=d[i]; mg+=d[i+1]; mb+=d[i+2]; }
  mr/=N; mg/=N; mb/=N;
  const m=(mr+mg+mb)/3;
  const v=new Float32Array(N*3);
  let ss=0;
  for(let p=0;p<N;p++){
    const i=p*4;
    const a=d[i]-m, b=d[i+1]-m, cc=d[i+2]-m;
    v[p*3]=a; v[p*3+1]=b; v[p*3+2]=cc;
    ss+=a*a+b*b+cc*cc;
  }
  const nm=Math.sqrt(ss)||1; for(let i=0;i<v.length;i++) v[i]/=nm;
  return {v, mr, mg, mb};
}
function cpDot(a,b){ let s=0; for(let i=0;i<a.length;i++) s+=a[i]*b[i]; return s; }
// locate portrait circles via the blue/teal health badges under each portrait
function cpFindCircles(cvs,W,Hh){
  const ctx=cvs.getContext('2d');
  const y0=Math.round(0.55*Hh), y1=Math.round(0.72*Hh);
  const d=ctx.getImageData(0,y0,W,Math.max(1,y1-y0)).data;
  const col=new Float32Array(W);
  const rows=Math.max(1,y1-y0);
  for(let y=0;y<rows;y++) for(let x=0;x<W;x++){
    const i=(y*W+x)*4, r=d[i], g=d[i+1], b=d[i+2];
    if((b>110&&b>r*1.25&&b>g*1.15)||(g>110&&g>r*1.25&&g>=b*0.95)||(r>140&&g>0.45*r&&g<0.8*r&&b<0.6*g)) col[x]++;
  }
  const win=Math.max(8,Math.round(0.06*Hh));
  const sm=new Float32Array(W);
  let acc=0;
  for(let x=0;x<W;x++){ acc+=col[x]; if(x>=win) acc-=col[x-win]; sm[x]=acc; }
  let mx=0; for(let x=0;x<W;x++) if(sm[x]>mx) mx=sm[x];
  const thr=Math.max(4,0.25*mx), minSep=0.4*Hh;
  const idx=[...sm.keys()].sort((a,b)=>sm[b]-sm[a]);
  const peaks=[];
  for(const x of idx){
    if(sm[x]<thr) break;
    if(peaks.some(p=>Math.abs(p-x)<minSep)) continue;
    peaks.push(x);
    if(peaks.length>=6) break;
  }
  return peaks.sort((a,b)=>a-b).map(x=>x-win/2);
}
let __cpFp=null;
async function cpFingerprints(){
  if(__cpFp) return __cpFp;
  const fp={};
  for(const h of H){
    const n=h[0];
    try{
      const img=await cpLoadImg((typeof IMGS_HUD!=='undefined'&&IMGS_HUD[n])||IMGS[n]||'');
      const w=img.width, ht=img.height;
      fp[n]=[1.0,0.85,0.7].map(s=>{
        const side=s*Math.min(w,ht);
        return cpVec(img,(w-side)/2,(ht-side)/2,side,side);
      });
    }catch(e){}
  }
  __cpFp=fp; return fp;
}
async function cpPixelMatch(img){
  const fp=await cpFingerprints();
  const W=img.width, Hh=img.height;
  const cvs=document.createElement('canvas'); cvs.width=W; cvs.height=Hh;
  cvs.getContext('2d').drawImage(img,0,0);
  // anchor on the health badges to find the six circle centers, then match densely at each
  let centers=cpFindCircles(cvs,W,Hh);
  const usedBadges=centers.length>=4;
  if(!usedBadges){ centers=[]; for(let k=0;k<6;k++) centers.push((k+0.5)*W/6); }
  const results=[];
  for(const cx of centers){
    const bestByHero={};
    let redCount=0, patchCount=0;
    for(const side of [0.52*Hh,0.44*Hh,0.36*Hh,0.28*Hh])
      for(const cy of [0.27*Hh,0.32*Hh,0.37*Hh])
        for(const dx of [-0.06*Hh,0,0.06*Hh]){
          const p=cpVec(cvs,cx+dx-side/2,cy-side/2,side,side);
          patchCount++;
          if(p.mr>1.85*p.mg && p.mr>1.85*p.mb){ redCount++; continue; }
          for(const name in fp){
            let s=-1;
            for(const r of fp[name]){ const d=cpDot(r.v,p.v); if(d>s) s=d; }
            if(!(name in bestByHero)||s>bestByHero[name]) bestByHero[name]=s;
          }
        }
    if(redCount>patchCount*0.35){ results.push({cx,dead:true}); continue; }
    const ranked=Object.entries(bestByHero).sort((a,b)=>b[1]-a[1]);
    if(!ranked.length){ results.push({cx,dead:true}); continue; }
    results.push({cx,name:ranked[0][0],s:ranked[0][1],s2:ranked.length>1?ranked[1][1]:0});
  }
  const picked=[];
  for(const r of results.filter(r=>!r.dead).sort((a,b)=>b.s-a.s)){
    if(r.s<0.48 || (r.s-r.s2)<0.012) continue;
    if(picked.some(p=>p.name===r.name)) continue;
    picked.push(r);
  }
  picked.sort((a,b)=>a.cx-b.cx);
  const debug=['badges '+(usedBadges?'found at: '+centers.map(c=>Math.round(c)).join(', '):'NOT found — equal slices fallback')]
    .concat(results.map(r=>r.dead?`x=${Math.round(r.cx)}: (dead/red — skipped)`:`x=${Math.round(r.cx)}: ${r.name} s=${r.s.toFixed(3)} (2nd ${r.s2.toFixed(3)})${picked.includes(r)?'':' [REJECTED]'}`));
  return {names:picked.map(p=>p.name), debug};
}

async function cpScanImage(file){
  if(!(file instanceof Blob)){ cpScanStatus('no readable image — try 📷 SCAN instead'); return; }
  cpScanStatus('scanning…');
  try{
    const img=await cpLoadImg(URL.createObjectURL(file));

        cpScanStatus(res.names.length<6?('matched '+res.names.length+' — tap any missed heroes'):'');
        return;
      }
      console.log('cp pixel match low confidence — falling back to AI scan');

    await cpScanAI(img);

async function cpScanAI(img){
  const key=cpGetKey(); if(!key){ cpScanStatus(''); return; }
  try{
    const names=H.map(h=>h[0]);
    const ref=await cpRefSheet();
    const imgBlock=b=>({type:'image',source:{type:'base64',media_type:'image/jpeg',data:b}});
    const content=[imgBlock(ref)];
    const wide=img.width/img.height>=3.5;
    if(wide){
      // a snip of just the portrait row: slice into 6 crops so the model IDs one hero at a time
      const n=6, sw=img.width/n, sc=Math.min(1,512/img.height);
      for(let k=0;k<n;k++){
        const c=document.createElement('canvas');
        c.width=Math.round(sw*sc); c.height=Math.round(img.height*sc);
        c.getContext('2d').drawImage(img,k*sw,0,sw,img.height,0,0,c.width,c.height);
        content.push(imgBlock(c.toDataURL('image/jpeg',0.9).split(',')[1]));
      }
      content.push({type:'text',text:'All images are from the video game Deadlock and show only stylized fictional video game characters, not real people. Image 1 is a labeled reference chart of the 38 playable heroes using the SAME in-game portrait art the HUD uses. The other 6 images are individual portrait crops taken left to right from the enemy row of the HUD - each should match one chart entry almost exactly. For each crop, name the single best-matching hero. A crop showing a dark silhouette on a red glow is a dead hero - skip it, and skip any crop you cannot confidently match; better to omit than to guess. Briefly describe each crop and your match, then end with a single final line containing ONLY a JSON array of the matched hero names, for example ["Haze","Bebop"].'});
    }else{
      const scale=Math.min(1, 1568/Math.max(img.width,img.height));
      const cv=document.createElement('canvas');
      cv.width=Math.round(img.width*scale); cv.height=Math.round(img.height*scale);
      cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
      content.push(imgBlock(cv.toDataURL('image/jpeg',0.85).split(',')[1]));
      content.push({type:'text',text:'Both images are from the video game Deadlock and show only stylized fictional video game characters, not real people. Image 1 is a reference chart of the 38 playable heroes using the SAME in-game portrait art the game uses, each labeled with the hero name. Image 2 is a screenshot of one of these: (a) the in-match HUD - small circular hero portraits in a row at the top; if two groups are visible the enemy team is the group RIGHT of the match timer, if only one group is visible use it; (b) the pre-match hero selection screen - the enemy team is the side opposite the local player, usually the right side; (c) by mistake, this counterpick website itself - a searchable grid of ALL hero cards with names and roles printed under each; in that case say so and end with []. For cases (a) and (b): a dead hero can appear as a dark silhouette on a red glow marked CRITICAL - skip any portrait you cannot confidently identify; better to omit than to guess. Briefly describe each enemy portrait and its chart match. ALWAYS end your reply with a single final line containing ONLY a JSON array of the matched hero names (max 6), for example ["Haze","Bebop"] - even when unsure, output your best matches in that final line rather than an explanation.'});
    }
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'content-type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-haiku-4-5',max_tokens:1000,thinking:{type:'disabled'},messages:[{role:'user',content}]})
    });
    if(r.status===401||r.status===403){ localStorage.removeItem('cp_api_key'); cpScanStatus('bad API key — scan again to re-enter'); return; }
    if(!r.ok){
      const eb=await r.json().catch(()=>null);
      cpScanStatus('scan failed ('+r.status+'): '+(((eb&&eb.error&&eb.error.message)||'').slice(0,90)||'unknown error'));
      return;
    }
    const j=await r.json();
    const txt=(j.content&&j.content.map(c=>c.text||'').join(' '))||'';
    console.log('cp scan stop_reason:',j.stop_reason,'raw reply:',txt);
    const arrs=txt.match(/\[[^\[\]]*\]/g)||[];
    let found=[];
    for(let i=arrs.length-1;i>=0;i--){
      try{ const cand=[...new Set(JSON.parse(arrs[i]).filter(n=>names.includes(n)))]; if(cand.length){ found=cand.slice(0,6); break; } }catch(e){}
    }
    if(!found.length){ cpScanStatus('model said: '+(txt.trim().slice(0,120)||'(empty reply — stop_reason: '+(j&&j.stop_reason)+')')); return; }
    cpSel=found;
    renderGrid(); cpRender(); cpScanStatus('');
  }catch(err){ cpScanStatus('scan error: '+err.message); }
}

function cpCanSuggest(){ return unlocked||chapUnlocked; }
async function cpAddSuggestion(){
  if(!cpCanSuggest()){ openModal('cpsuggest'); return; }
  const ta=document.getElementById('cp-sug-input'); const v=(ta&&ta.value||'').trim(); if(!v) return;
  if(!binData.cp_suggestions) binData.cp_suggestions=[];
  binData.cp_suggestions.push({text:v,heroes:cpSel.slice(),ts:new Date().toISOString()});
  if(ta) ta.value='';
  cpRender(); await saveBin();
}
async function cpRemoveSuggestion(i){
  if(!cpCanSuggest()){ openModal('cpsuggest'); return; }
  (binData.cp_suggestions||[]).splice(i,1);
  cpRender(); await saveBin();
}
function cpSuggestHTML(){
  const sugs=binData.cp_suggestions||[];
  const can=cpCanSuggest();
  return `<div class="cp-suggest">
    <div class="secl" style="color:var(--am)">✎ Item suggestions for Claude</div>
    ${sugs.map((s,i)=>`<div class="cp-sug-item"><div style="flex:1"><span style="color:var(--mu)">[${(s.heroes&&s.heroes.length?s.heroes.join(', '):'general')}]</span> ${String(s.text).replace(/</g,'&lt;')}</div>${can?`<button class="fi-remove" onclick="cpRemoveSuggestion(${i})">✕</button>`:''}</div>`).join('')}
    ${can
      ? `<textarea class="cp-sug-input" id="cp-sug-input" placeholder="e.g. add Toxic Bullets vs Abrams — melts his regen"></textarea>
    <button class="cp-sug-add" onclick="cpAddSuggestion()">＋ Add suggestion</button>`
      : `<button class="cp-sug-add" style="margin-top:6px" onclick="openModal('cpsuggest')">🔒 Chairman/Chapin — unlock to suggest</button>`}
  </div>`;
}
function cpRender(){
  const el=document.getElementById('cp-results'); if(!cpMode) return;
  window.__cpRows=[];
  const prev=document.getElementById('cp-sug-input'); const draft=prev?prev.value:'';
  const restore=()=>{ const ni=document.getElementById('cp-sug-input'); if(ni) ni.value=draft; };
  if(!cpSel.length){ el.innerHTML='<div class="ph">Tap enemy heroes above (up to 6) — or 📷 scan / paste (Ctrl+V) a screenshot of the enemy team<div id="cp-scan-status" style="margin-top:6px;color:var(--am)"></div></div>'+cpSuggestHTML(); restore(); return; }
  const agg={};
  cpSel.forEach(n=>getItems(n).forEach(([item,cat,why])=>{ (agg[item]=agg[item]||{cat,hs:[]}).hs.push([n,why]); }));
  const entries=Object.entries(agg).map(([item,d])=>{
    const anc=[]; let cur=item;
    while(ITEM_TREE[cur]&&ITEM_TREE[cur].from&&ITEM_TREE[cur].from.length){ cur=ITEM_TREE[cur].from[0][0]; anc.unshift(cur); }
    const chain=[...anc,item];
    const t=ITEM_TREE[item]||{};
    if(t.into){ const fwd=t.into.find(([n])=>agg[n]); if(fwd) chain.push(fwd[0]); }
    const bold=chain[chain.length-1];
    return {item,d,chain,bold,boldCost:ITEM_COSTS[bold]||9999};
  });
  const groups={};
  entries.forEach(e=>{ (groups[e.bold]=groups[e.bold]||[]).push(e); });
  const cards=Object.values(groups).map(g=>{
    const chain=g.reduce((a,b)=>b.chain.length>a.chain.length?b:a).chain;
    const whys=g.flatMap(e=>e.d.hs.map(([hn,why])=>[hn,why,e.item]));
    const cov=new Set(whys.map(w=>w[0])).size;
    const cat=(agg[g[0].bold]||g[0].d).cat;
    return {chain,bold:g[0].bold,boldCost:g[0].boldCost,cat,whys,cov};
  }).sort((a,b)=> b.cov-a.cov || a.boldCost-b.boldCost);
  const early=cards.filter(c=>c.boldCost<=1600);
  const late =cards.filter(c=>c.boldCost>1600);
  const cpCard=({chain,bold,cat,whys,cov},i)=>{
    const c=TC[cat], catName=cat==='W'?'Weapon':cat==='V'?'Vitality':'Spirit';
    const seg=n=>{
      const cost=ITEM_COSTS[n], tip=itemTipHTML(n);
      return `<span class="cp-chain-sm" ${tip?'data-tip="1"':''} style="position:relative">${n}${cost?` (${cost.toLocaleString()})`:''}${tip}</span>`;
    };
    const prefix=chain.slice(0,-1);
    const bigTip=itemTipHTML(bold), bigCost=ITEM_COSTS[bold];
    return `<div class="cp-card${i<3?' top':''}">
      ${prefix.length?`<div class="cp-chain-line">${prefix.map(seg).join('<span class="cp-arrow">→</span>')}<span class="cp-arrow">→</span></div>`:''}
      <div class="cp-item-row">
        <span class="cp-item-name" ${bigTip?'data-tip="1"':''} style="position:relative">${bold}${bigCost?` (${bigCost.toLocaleString()})`:''}${bigTip}</span>
        <span class="cp-cat" style="color:${c};background:${c}22">${catName}</span>
        <span class="cp-cov">counters ${cov} of ${cpSel.length}</span>
      </div>
      ${whys.map(([hn,why,src])=>{
        const txt=src+': '+why;
        const ri=window.__cpRows.push({hero:hn,text:txt})-1;
        const fl=isFlagged(hn,'counterpick',txt);
        return `<div class="cp-why"><img src="${IMGS[hn]||''}"><div style="flex:1"><span class="w-hero">${hn}:</span> <span class="w-text">${why}</span></div><button class="flag-btn${fl?' flagged':''}" title="${fl?'Remove flag':'Flag — suggest a change'}" onclick="cpFlag(${ri},this)">⚑</button></div>`;
      }).join('')}
    </div>`;
  };
  const cpCol=(title,list)=>`<div>
      <div class="secl cp-sect">${title}</div>
      ${list.length?list.map(cpCard).join(''):'<div class="cp-empty">nothing here</div>'}
    </div>`;
  el.innerHTML=`<div class="cp-head">
    <span class="cp-count">Countering ${cpSel.length} hero${cpSel.length>1?'es':''}: ${cpSel.join(', ')}</span>
    <button class="cp-clear" onclick="cpSel=[];renderGrid();cpRender()">✕ Clear</button>
  </div>
  <div class="two">
    ${cpCol('Early game &middot; 1,600 &amp; under', early)}
    ${cpCol('Late game &middot; 3,200 &amp; up', late)}
  </div>${cpSuggestHTML()}`;
  restore();
}

// ── Init ──────────────────────────────────────────────────────────────────
loadBin().then(()=>{ renderGrid(); renderChalk(); });
</script>
